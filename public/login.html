<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AuraFocus</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(17, 24, 39, 0.88);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #fbbf24;
      --accent-2: #fb7185;
      --border: rgba(148, 163, 184, 0.18);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(251, 191, 36, 0.22), transparent 32%),
        radial-gradient(circle at 80% 20%, rgba(251, 113, 133, 0.16), transparent 24%),
        linear-gradient(135deg, #050816, #0b1020 60%, #111827);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 440px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0 0 12px;
      font-family: Orbitron, Inter, system-ui, sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, #ffffff, #f8fafc);
      color: #111827;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .google-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.22);
    }

    .note {
      margin-top: 18px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .note a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AuraFocus</h1>
    <p>Use your Google account to sign in through Auth0 and continue to the AuraFocus dashboard.</p>
    <a class="google-btn" href="/login/google">
      <span>Continue with Google</span>
    </a>
    <div class="note">
      New here? <a href="/signup">Create an account</a>.
    </div>
    <div class="note">
      If you land on Auth0 instead of Google, make sure the Google social connection is enabled in your Auth0 dashboard.
    </div>
  </main>
</body>
</html>
